<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Tính Toàn Màn Hình</title>
    <style>
        /* Xóa bỏ khoảng trắng thừa của trình duyệt */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Ẩn thanh cuộn của trang web chính */
            background-color: #fff;
        }
        /* Cấu hình iframe chiếm trọn 100% chiều rộng và chiều cao màn hình */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Thay link xuất bản của bạn vào phần src bên dưới -->
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSuoi7sGA0bqKaqhcbAbNFhO7Cp7hq3VM9nYnyYZD5ZXnnOeEdlCHkyJQCVvK5JZRj0JEkr1pm2P0Y8/pubhtml?htmlview=true"></iframe>
    <!--<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSuoi7sGA0bqKaqhcbAbNFhO7Cp7hq3VM9nYnyYZD5ZXnnOeEdlCHkyJQCVvK5JZRj0JEkr1pm2P0Y8/pubhtml?widget=true&amp;headers=false"></iframe>-->

</body>
</html>
